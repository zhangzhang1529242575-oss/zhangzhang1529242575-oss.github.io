baseURL: https://zhangzhang1529242575-oss.github.io/
languageCode: zh-cn
locale: zh-cn
title: 电机控制学习笔记
theme: PaperMod

# 搜索功能需要 JSON 索引
outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  # 固定浅色主题
  defaultTheme: light
  disableThemeToggle: true

  # 个人信息
  author: 张章
  description: 电机控制博士生，记录学习与研究心得

  # 首页 — 自定义 Hero 设计
  profileMode:
    enabled: false

  homeInfoParams:
    Title: 欢迎 👋
    Content: |
      这里是张章的个人技术博客。

      研究方向：多端口电机建模与控制、鲁棒控制算法、智能控制算法。

      记录论文笔记、控制理论学习、仿真与实验心得。

  # 文章显示
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true

  # KaTeX 数学公式渲染
  math: true

  # 用于KaTeX的额外head
  assets:
    disableFingerprinting: false
    favicon: ""

# 菜单
menu:
  main:
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 10
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 20
    - identifier: portfolio
      name: 代表作
      url: /portfolio/
      weight: 25
    - identifier: search
      name: 搜索
      url: /search/
      weight: 30
    - identifier: about
      name: 关于
      url: /about/
      weight: 40

# Markdown 配置
markup:
  goldmark:
    renderer:
      unsafe: true  # 允许HTML（KaTeX需要）
  highlight:
    style: monokai
